  - title: "Managing Front-office and Back-office Effort Allocation: Unpacking the Effects of Workload on Service Performance"
    authors:
      - name: "[Chuan Zhu, Tom Fangyun Tan, Tianjun Feng]"
    status: "Working paper"
    target_or_current_venue: "[TODO]"

    research_question:
      primary_research_question: "How does workload shape online service agents' allocation between customer-facing interaction and back-office problem solving, and how does this allocation affect service performance?"

    setting_or_context: "Live-chat customer service operations at a large Chinese e-commerce platform."

    methods:
      - "Large-scale operational data analysis"
      - "Control-function approach with instrumental variables"
      - "Mediation analysis"
      - "Textual analysis using LDA and LLM-based measures"

    main_contribution: "The paper shows that service performance depends on maintaining an intermediate balance between front-office interaction and back-office problem solving."

    abstract_short: "Using granular customer service data from a large e-commerce platform, this paper examines how workload affects agents' within-session effort allocation. Workload has a U-shaped effect on the front ratio, and the front ratio mediates the effect of workload on session duration, customer ratings, and retrials. The findings show that neither too little nor too much customer-facing interaction is optimal; effective service requires balancing visible communication with substantive problem-solving work."

